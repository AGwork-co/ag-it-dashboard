name: Build & Deploy Dashboard

on:
  schedule:
    - cron: '0 13,17,21 * * 1-5'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Fix template placeholder
        run: sed -i 's|/\*__PROJECT_DATA__\*/\[\]|/*__PROJECT_DATA__*/|' template.html

      - name: Build dashboard
        env:
          AZURE_DEVOPS_PAT: ${{ secrets.AZURE_DEVOPS_PAT }}
          AZURE_DEVOPS_ORG_URL: ${{ secrets.AZURE_DEVOPS_ORG_URL }}
          REFRESH_WORKER_URL: ${{ secrets.REFRESH_WORKER_URL }}
        run: npm run build

      - name: Commit and push updated dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Save our freshly built file and sprint cache
          cp docs/index.html /tmp/dashboard.html
          if [ -f cache/sprint-history.json ]; then
            mkdir -p /tmp/cache
            cp cache/sprint-history.json /tmp/cache/sprint-history.json
          fi
          # Reset to whatever remote has (no conflicts possible)
          git fetch origin main
          git reset --hard origin/main
          # Put our built files back and commit
          cp /tmp/dashboard.html docs/index.html
          if [ -f /tmp/cache/sprint-history.json ]; then
            mkdir -p cache
            cp /tmp/cache/sprint-history.json cache/sprint-history.json
            git add cache/sprint-history.json
          fi
          git add docs/index.html
          git diff --staged --quiet || git commit -m "Dashboard updated"
          git push
