name: Build & Deploy Dashboard

on:
  # Run every 4 hours on weekdays (CST business hours focus)
  schedule:
    - cron: '0 13,17,21 * * 1-5'→ Runs at 13:00, 17:00 and 21:00, Monday through Friday  # 7am, 11am, 3pm CST
  # Manual trigger from GitHub UI
  workflow_dispatch:
  # Also rebuild on push to main (for template/config changes)
  push:
    branches: [main]

permissions:
  contents: write
  pages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build dashboard
        env:
          AZURE_DEVOPS_PAT: ${{ secrets.AZURE_DEVOPS_PAT }}
          AZURE_DEVOPS_ORG_URL: ${{ secrets.AZURE_DEVOPS_ORG_URL }}
        run: npm run build
