name: Build & Deploy Dashboard

on:
  schedule:
    - cron: '0 13,17,21 * * 1-5'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Fix template placeholder
        run: sed -i 's|/\*__PROJECT_DATA__\*/\[\]|/*__PROJECT_DATA__*/|' template.html

      - name: Build dashboard
        env:
          AZURE_DEVOPS_PAT: ${{ secrets.AZURE_DEVOPS_PAT }}
          AZURE_DEVOPS_ORG_URL: ${{ secrets.AZURE_DEVOPS_ORG_URL }}
          GH_TRIGGER_TOKEN: ${{ secrets.GH_TRIGGER_TOKEN }}
        run: npm run build

      - name: Commit and push updated dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "Dashboard updated"
          git checkout -- .
          git pull --rebase origin main
          git push
