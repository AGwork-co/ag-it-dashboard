name: Build & Deploy Dashboard

on:
  # Run every 4 hours on weekdays (CST business hours focus)
  schedule:
    - cron: '0 13,17,21 * * 1-5'  # 7am, 11am, 3pm CST
  # Manual trigger from GitHub UI
  workflow_dispatch:
  # Also rebuild on push to main (for template/config changes)
  push:
    branches: [main]

permissions:
  contents: write
  pages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build dashboard
        env:
          AZURE_DEVOPS_PAT: ${{ secrets.AZURE_DEVOPS_PAT }}
          AZURE_DEVOPS_ORG_URL: ${{ secrets.AZURE_DEVOPS_ORG_URL }}
        run: npm run build

      - name: Commit and push updated dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          # Only commit if there are changes
          git diff --staged --quiet || git commit -m "📊 Dashboard updated — $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
